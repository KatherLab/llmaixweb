name: Security

# Security scanning: static analysis (SAST), dependency vulnerability audits,
# and secret scanning. Complements Dependabot (which keeps deps fresh) with
# active vulnerability + secret detection. Findings surface in the Actions log
# and, for CodeQL, the repository Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly baseline scan so newly-disclosed CVEs are caught even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Python dependency audit (pip-audit)
        # Audits the locked Python environment against PyPI advisories. Does not
        # fail the build on a finding (informational) — flip to remove
        # `|| true` once the baseline is clean to gate merges on it.
        run: uv run --with pip-audit pip-audit || true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          # Match the frontend build image (Dockerfile.frontend → node:26-alpine).
          node-version: "26"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: npm audit (high severity)
        run: npm audit --audit-level=high || true

  trivy-fs:
    name: Trivy filesystem & config scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Trivy vulnerability + misconfiguration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: "0" # informational baseline; set to "1" to gate once clean