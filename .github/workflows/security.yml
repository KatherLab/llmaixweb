name: Security

# Security scanning: static analysis (SAST), dependency vulnerability audits,
# and secret scanning. Complements Dependabot (which keeps deps fresh) with
# active vulnerability + secret detection. Findings surface in the Actions log
# and, for CodeQL, the repository Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly baseline scan so newly-disclosed CVEs are caught even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Python dependency audit (pip-audit)
        # Audits the locked Python environment against PyPI advisories. Does not
        # fail the build on a finding (informational) — flip to remove
        # `|| true` once the baseline is clean to gate merges on it.
        run: uv run --with pip-audit pip-audit || true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          # Match the frontend build image (Dockerfile.frontend → node:26-alpine).
          node-version: "26"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: npm audit (high severity)
        run: npm audit --audit-level=high || true

  trivy-fs:
    name: Trivy filesystem & config scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Trivy vulnerability + misconfiguration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: "0" # informational baseline; set to "1" to gate once clean

  license-compliance:
    name: Dependency license compliance
    # Lists the licenses of all SHIPPED dependencies so a new copyleft or
    # no-license dependency is caught in review. AGPL-3.0-or-later (this
    # project's license) is compatible with the permissive + weak-copyleft
    # licenses currently in use. Informational baseline — see the `--fail-on`
    # / `--failOn` notes below to turn it into a merge gate.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Backend license scan (production deps)
        env:
          SKIP_RUNTIME_CHECKS: "true"
        run: |
          uv export --no-dev --no-emit-project --format requirements-txt > /tmp/prod-reqs.txt
          # Add `--fail-on "GPL;LGPL;MPL"` (etc.) to gate the build on a
          # disallowed license — e.g. before a future relicense to MIT.
          uvx --with-requirements /tmp/prod-reqs.txt --with pip-licenses \
            pip-licenses --format=markdown --with-urls --order=license || true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "26"
          cache: npm

      - name: Frontend license scan (production deps)
        # Add `--failOn "GPL-3.0-only;AGPL-3.0-only"` to gate the build.
        run: npx --yes license-checker-rseidelsohn --production --start . --summary || true