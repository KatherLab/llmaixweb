name: Build and Push Docker Images

# On pull requests and pushes to main the images are BUILT (both platforms) to
# catch Dockerfile/build breakage early, but not pushed. On a published release
# the same build is tagged and pushed to the registry.
on:
  release:
    types: [published]
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.backend
            image: llmaixweb-backend
            platforms: linux/amd64,linux/arm64
          - dockerfile: Dockerfile.frontend
            image: llmaixweb-frontend
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only publish on a release; PR/push runs are build-only validation.
      - name: Log in to Container Registry
        if: github.event_name == 'release'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/katherlab/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          # Push only on release; PR/push builds validate without publishing.
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT_HASH=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/katherlab/${{ matrix.image }}:buildcache
          # Writing the build cache needs registry push access, so only on release.
          cache-to: ${{ github.event_name == 'release' && format('type=registry,ref={0}/katherlab/{1}:buildcache,mode=max', env.REGISTRY, matrix.image) || '' }}
