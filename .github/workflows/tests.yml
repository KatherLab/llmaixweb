name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend lint & format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Ruff check
        run: uv run ruff check backend/src/

      - name: Ruff format check
        run: uv run ruff format --check backend/src/

  frontend-check:
    name: Frontend lint, types, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          # Match the frontend build image (Dockerfile.frontend → node:26-alpine).
          node-version: "26"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format, lint & type-check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-deu tesseract-ocr-eng

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Create temporary local directory
        run: mkdir -p test_local_storage

      - name: Run tests
        # Coverage floor set just below the current baseline (~40%) so it can't
        # silently regress; ratchet up as coverage grows.
        run: >
          ENV_PATH=backend/tests/.env uv run pytest
          --cov=backend/src --cov-report=term-missing --cov-fail-under=38

  migrations:
    name: Alembic migrations (PostgreSQL)
    runs-on: ubuntu-latest

    # Prod runs `alembic upgrade head` against PostgreSQL on container start, but
    # the test suite runs on SQLite via create_all() — so a broken migration
    # (or a Postgres-only DDL issue) would ship undetected. Exercise the full
    # migration chain against a real PostgreSQL here.
    services:
      postgres:
        # Match the production database (compose.yml → postgres:18-alpine).
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: llmaixweb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run migrations to head
        env:
          SKIP_RUNTIME_CHECKS: "true"
          SQLALCHEMY_DATABASE_URI: postgresql+psycopg://postgres:postgres@localhost:5432/llmaixweb
        run: uv run alembic upgrade head

      - name: Check for model/migration drift
        # `alembic check` autogenerates against the just-migrated schema and
        # fails if the models and migrations have drifted apart (a migration was
        # forgotten). Migration-only Postgres indexes are excluded via
        # include_object in alembic/env.py.
        env:
          SKIP_RUNTIME_CHECKS: "true"
          SQLALCHEMY_DATABASE_URI: postgresql+psycopg://postgres:postgres@localhost:5432/llmaixweb
        run: uv run alembic check

      - name: Verify downgrade path
        # A migration with a broken/missing downgrade only surfaces when someone
        # needs to roll back in an incident. Exercise the full chain down to base
        # and back up to head so downgrades stay runnable.
        env:
          SKIP_RUNTIME_CHECKS: "true"
          SQLALCHEMY_DATABASE_URI: postgresql+psycopg://postgres:postgres@localhost:5432/llmaixweb
        run: |
          uv run alembic downgrade base
          uv run alembic upgrade head

  celery-integration:
    name: Celery + Redis integration (real broker)
    runs-on: ubuntu-latest

    # Runs the chunked-preprocessing task through a REAL Celery worker + Redis
    # broker + PostgreSQL (not eager mode), covering broker round-trips and the
    # self-requeue being driven by actual Redis messages. Provided via GitHub
    # service containers; the test reads TEST_REDIS_URL + TEST_DATABASE_URL.
    services:
      redis:
        # Match production (compose.yml → redis:8-alpine).
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        # Match production (compose.yml → postgres:18-alpine).
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: llmaix_itest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run Celery integration test
        env:
          TEST_REDIS_URL: redis://localhost:6379/0
          TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/llmaix_itest
        run: >-
          ENV_PATH=backend/tests/.env uv run pytest
          backend/tests/test_celery_integration.py -v

  frontend-e2e:
    name: Frontend e2e smoke (Playwright)
    runs-on: ubuntu-latest

    # Drives the core workflow (login → project → upload → preprocess → schema →
    # prompt → trial → evaluation) through a real browser. Playwright boots a
    # fake OpenAI server, the broker-free backend (SQLite, DISABLE_CELERY), and
    # the Vite dev server — no Redis/Postgres/OCR needed.
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "26"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke
        run: npm run test:e2e