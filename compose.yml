services:
  # docling-serve: Separate service for PDF/image OCR and conversion
  # This keeps Docling out of the main backend/Celery processes, reducing
  # memory usage and avoiding duplicate model loading in workers.
  docling-serve:
    image: quay.io/docling-project/docling-serve-cpu:latest
    restart: unless-stopped
    environment:
      - DOCLING_SERVE_ENABLE_UI=0
      - UVICORN_WORKERS=2
      - OMP_NUM_THREADS=2
      # TESSDATA_PREFIX: verify path in container first; remove if not needed
    # ports:
    #   - "5001:5001"
    # Memory limit: 6GB is usually sufficient for CPU-based Tesseract OCR
    # Adjust based on your deployment needs
    mem_limit: 8g
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/openapi.json', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH}
    image: ghcr.io/katherlab/llmaixweb-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg://postgres:postgres@postgres/llmaixweb
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DISABLE_CELERY=false
      - INITIALIZE_CELERY=${INITIALIZE_CELERY:-false}
      - REQUIRE_INVITATION=${REQUIRE_INVITATION:-false}
      - APP_URL=${APP_URL:-http://localhost:5173}
      - DOCLING_SERVE_URL=http://docling-serve:5001
      # Defaults to true for the stock deployment; .env can override (e.g.
      # DOCLING_SERVE_ENABLED=false). Interpolated here rather than relying on
      # env_file, because a literal value in `environment:` would override .env.
      - DOCLING_SERVE_ENABLED=${DOCLING_SERVE_ENABLED:-true}
    # ports: ["8000:8000"] # uncomment for local debugging / testing the backend
    depends_on:
      docling-serve:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully

  worker_default:
    image: ghcr.io/katherlab/llmaixweb-backend:latest
    restart: unless-stopped
    env_file: .env
    command: >
      /app/.venv/bin/python -m celery -A backend.src.celery.celery_config
      worker -Q default -c 4 --loglevel=info
    depends_on:
      backend:
        condition: service_started

  worker_preprocess:
    image: ghcr.io/katherlab/llmaixweb-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - DOCLING_SERVE_URL=http://docling-serve:5001
      # .env can override (e.g. DOCLING_SERVE_ENABLED=false). Keeps the worker
      # and web process in agreement when .env is unset.
      - DOCLING_SERVE_ENABLED=${DOCLING_SERVE_ENABLED:-true}
    command: >
      /app/.venv/bin/python -m celery -A backend.src.celery.celery_config
      worker -Q preprocess -c 1 --loglevel=info
    depends_on:
      backend:
        condition: service_started
      docling-serve:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH}
    image: ghcr.io/katherlab/llmaixweb-frontend:latest
    restart: unless-stopped
    ports: ["5173:8080"]
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rustfs-init:
    image: rustfs/rc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        set -e;
        export S3_BUCKET_NAME="$${S3_BUCKET_NAME:-llmaixweb}";
        until rc alias set local http://rustfs:9000 ${RUSTFS_ACCESS_KEY} ${RUSTFS_SECRET_KEY}; do
          echo 'Waiting for rustfs...' >&2;
          sleep 3;
        done;
        if ! rc mb local/$${S3_BUCKET_NAME} 2>/dev/null; then
          rc ls local/$${S3_BUCKET_NAME} >/dev/null 2>&1 || { echo \"Failed to create or find bucket '$${S3_BUCKET_NAME}'\" >&2; exit 1; };
          echo \"Bucket '$${S3_BUCKET_NAME}' already exists\";
        fi;
        rc anonymous set public local/$${S3_BUCKET_NAME} || { echo \"Failed to set anonymous access for '$${S3_BUCKET_NAME}'\" >&2; exit 1; };
        echo \"Bucket '$${S3_BUCKET_NAME}' ready\";
      "
    restart: "no"

volumes:
  pgdata:
  redis-data:
  minio-data: