services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH}
    image: ghcr.io/katherlab/llmaixweb-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg://postgres:postgres@postgres/llmaixweb
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DISABLE_CELERY=false
      - INITIALIZE_CELERY=${INITIALIZE_CELERY:-false}
      - REQUIRE_INVITATION=${REQUIRE_INVITATION:-false}
      - APP_URL=${APP_URL:-http://localhost:5173}
      - DOCLING_ARTIFACTS_PATH=/app/docling-models
    # ports: ["8000:8000"] # uncomment for local debugging / testing the backend
    depends_on:
      docling-models-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully

  worker_default:
    image: ghcr.io/katherlab/llmaixweb-backend:latest
    restart: unless-stopped
    env_file: .env
    command: >
      /app/.venv/bin/python -m celery -A backend.src.celery.celery_config
      worker -Q default -c 4 --loglevel=info
    depends_on:
      backend:
        condition: service_started

  worker_preprocess:
    image: ghcr.io/katherlab/llmaixweb-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - DOCLING_ARTIFACTS_PATH=/app/docling-models
    volumes:
      - docling-models:/app/docling-models
    command: >
      /app/.venv/bin/python -m celery -A backend.src.celery.celery_config
      worker -Q preprocess -c 1 --loglevel=info
    depends_on:
      backend:
        condition: service_started

  docling-models-init:
    image: ghcr.io/katherlab/llmaixweb-backend:latest
    user: "10001:10001"
    restart: "no"
    env_file: .env
    environment:
      - DOCLING_ARTIFACTS_PATH=/app/docling-models
    volumes:
      - docling-models:/app/docling-models
    command: >
      /bin/sh -c "
        if [ -f /app/docling-models/.ready ]; then
          echo 'Docling models already present';
          exit 0;
        fi;

        echo 'Downloading Docling models...';
        mkdir -p /app/docling-models &&
        /app/.venv/bin/docling-tools models download --output-dir /app/docling-models &&
        touch /app/docling-models/.ready &&
        echo 'Docling models ready' ||
        { echo 'Failed to download Docling models'; exit 1; }
      "

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH}
    image: ghcr.io/katherlab/llmaixweb-frontend:latest
    restart: unless-stopped
    ports: ["5173:8080"]
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rustfs-init:
    image: rustfs/rc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        until rc alias set local http://rustfs:9000 ${RUSTFS_ACCESS_KEY} ${RUSTFS_SECRET_KEY}; do
          sleep 3;
        done;
        rc mb local/${S3_BUCKET_NAME} || true;
        rc anonymous set public local/${S3_BUCKET_NAME} || true;
        echo 'Bucket '${S3_BUCKET_NAME}' ready';
      "
    restart: "no"

volumes:
  pgdata:
  redis-data:
  minio-data:
  docling-models: