services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.cpu
    image: ghcr.io/katherlab/llmaixweb-backend:cpu
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DISABLE_CELERY=false
      - INITIALIZE_CELERY=false
      - REQUIRE_INVITATION=false
    ports: ["8000:8000"]
    depends_on: [postgres, redis, minio]

  worker_default:
    image: ghcr.io/katherlab/llmaixweb-backend:cpu
    env_file: .env
    command: >
      /app/.venv/bin/python -m celery -A backend.src.celery.celery_config
      worker -Q default -c 4 --loglevel=info
    depends_on: [backend]

  worker_preprocess:
    image: ghcr.io/katherlab/llmaixweb-backend:cpu
    env_file: .env
    command: >
      /app/.venv/bin/python -m celery -A backend.src.celery.celery_config
      worker -Q preprocess -c 1 --loglevel=info
    depends_on: [backend]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH:-$(git rev-parse --short HEAD)}
    image: ghcr.io/katherlab/llmaixweb-frontend:latest
    environment:
      - VITE_API_BACKEND_URL=${VITE_API_BACKEND_URL:-http://localhost:8000/api/v1}
    ports: ["5173:8080"]
    depends_on: [backend]

  postgres:
    image: postgres:18-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on: [minio]
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          sleep 3;
        done;
        mc mb -p local/${S3_BUCKET_NAME} || true;
        mc anonymous set download local/${S3_BUCKET_NAME} || true;
        echo 'Bucket '${S3_BUCKET_NAME}' ready';
      "
    restart: "no"

volumes:
  pgdata:
  redis-data:
  minio-data: