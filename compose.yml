# Image tags: the LLMAIx images default to :latest for easy evaluation. For
# production deployments pin them to a release, e.g. LLMAIXWEB_IMAGE_TAG=0.6.6
# in .env, so a restart can't silently pull a different version. The same goes
# for the third-party images below (docling-serve, rustfs) — pin them once your
# deployment is validated.
services:
  # Downloads docling's OCR/layout models into the docling-models volume
  # before docling-serve starts (runs as root to avoid volume permission issues).
  # A marker file skips the download once models are present, so restarts work
  # offline/air-gapped. Delete .models-complete in the docling-models volume to
  # force a re-download (e.g. after an image upgrade).
  docling-models-init:
    image: quay.io/docling-project/docling-serve-cpu:latest
    restart: "no"
    user: "0:0"
    volumes:
      - docling-models:/models
    command: >
      sh -c "
        set -e;
        if [ -f /models/.models-complete ]; then
          echo 'Docling models already downloaded, skipping.';
        else
          docling-tools models download --output-dir /models;
          touch /models/.models-complete;
        fi;
      "

  # Separate service for PDF/image OCR and conversion, kept out of the
  # backend/Celery processes to reduce memory usage.
  docling-serve:
    image: quay.io/docling-project/docling-serve-cpu:latest
    restart: unless-stopped
    depends_on:
      docling-models-init:
        condition: service_completed_successfully
    environment:
      - DOCLING_SERVE_ENABLE_UI=false
      # CPU threads for inference. Tune via DOCLING_CPU_THREADS in .env
      # (recommended: ~number of physical CPU cores).
      - DOCLING_NUM_THREADS=${DOCLING_CPU_THREADS:-4}
      - OMP_NUM_THREADS=${DOCLING_CPU_THREADS:-4}
      - DOCLING_SERVE_ENG_KIND=local
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=1
      - DOCLING_SERVE_ENG_LOC_SHARE_MODELS=true
      - DOCLING_SERVE_ARTIFACTS_PATH=/models
      - DOCLING_SERVE_LOAD_MODELS_AT_BOOT=true
      - DOCLING_SERVE_SCRATCH_PATH=/scratch
    # ports:
    #   - "5001:5001"
    volumes:
      - docling-models:/models
      - docling-scratch:/scratch
    mem_limit: 8g
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/openapi.json', timeout=5)\"" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH}
    image: ghcr.io/katherlab/llmaixweb-backend:${LLMAIXWEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - local-storage:/data/local-storage
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DISABLE_CELERY=false
      - INITIALIZE_CELERY=${INITIALIZE_CELERY:-false}
      - REQUIRE_INVITATION=${REQUIRE_INVITATION:-false}
      - APP_URL=${APP_URL:-http://localhost:5173}
      - DOCLING_SERVE_URL=http://docling-serve:5001
      - DOCLING_SERVE_ENABLED=${DOCLING_SERVE_ENABLED:-true}
    # ports: ["8000:8000"] # uncomment for local debugging / testing the backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      docling-serve:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully

  worker_default:
    image: ghcr.io/katherlab/llmaixweb-backend:${LLMAIXWEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - local-storage:/data/local-storage
    environment:
      # Only set this when running a single worker per role (the stock
      # deployment); leave unset if you scale this queue to multiple workers.
      - CELERY_WORKER_ROLE=default
    # -B embeds the beat scheduler (keep on exactly one worker, don't scale
    # this service beyond replicas=1).
    command: >
      /app/.venv/bin/python -m celery -A backend.src.celery.celery_config
      worker -Q default -c 4 --loglevel=info -B -s /tmp/celerybeat-schedule
    # service_healthy (not service_started): the backend runs Alembic migrations
    # before serving, so waiting for its healthcheck keeps workers from racing
    # a half-migrated schema on first boot.
    depends_on:
      backend:
        condition: service_healthy

  worker_preprocess:
    image: ghcr.io/katherlab/llmaixweb-backend:${LLMAIXWEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - local-storage:/data/local-storage
    environment:
      - DOCLING_SERVE_URL=http://docling-serve:5001
      - DOCLING_SERVE_ENABLED=${DOCLING_SERVE_ENABLED:-true}
      # Keep this worker at a single replica; leave unset if you scale it.
      - CELERY_WORKER_ROLE=preprocess
    command: >
      /app/.venv/bin/python -m celery -A backend.src.celery.celery_config
      worker -Q preprocess -c 1 --loglevel=info
    depends_on:
      backend:
        condition: service_healthy
      docling-serve:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - GIT_COMMIT_HASH=${GIT_COMMIT_HASH}
    image: ghcr.io/katherlab/llmaixweb-frontend:${LLMAIXWEB_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports: ["5173:8080"]
    depends_on:
      backend:
        condition: service_healthy

  # The sidecar services below get only the variables they need (interpolated
  # from .env by compose), NOT the full env_file — the .env also holds
  # SECRET_KEY, SMTP and LLM API credentials that don't belong in every
  # container's environment.
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-llmaixweb}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rustfs-init:
    image: rustfs/rc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-llmaixweb}
    entrypoint: >
      /bin/sh -c "
        set -e;
        if [ -z \"$${RUSTFS_ACCESS_KEY}\" ] || [ -z \"$${RUSTFS_SECRET_KEY}\" ]; then
          echo 'RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY are empty — set them in .env' >&2;
          exit 1;
        fi;
        tries=0;
        until rc alias set local http://rustfs:9000 \"$${RUSTFS_ACCESS_KEY}\" \"$${RUSTFS_SECRET_KEY}\"; do
          tries=$$((tries + 1));
          if [ \"$$tries\" -ge 20 ]; then
            echo 'Could not authenticate to rustfs after 20 attempts — check RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY' >&2;
            exit 1;
          fi;
          echo 'Waiting for rustfs...' >&2;
          sleep 3;
        done;
        if ! rc mb local/$${S3_BUCKET_NAME} 2>/dev/null; then
          rc ls local/$${S3_BUCKET_NAME} >/dev/null 2>&1 || { echo \"Failed to create or find bucket '$${S3_BUCKET_NAME}'\" >&2; exit 1; };
          echo \"Bucket '$${S3_BUCKET_NAME}' already exists\";
        fi;
        echo \"Bucket '$${S3_BUCKET_NAME}' ready\";
      "
    restart: "no"

volumes:
  pgdata:
  redis-data:
  minio-data:
  docling-models:
  docling-scratch:
  # Shared file storage for LOCAL_DIRECTORY=/data/local-storage (storage
  # Option C in .env.example) — mounted into backend + both workers so all
  # processes see the same files.
  local-storage: