server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    # ── Security headers (defence-in-depth for a PHI-handling SPA) ──
    # add_header directives are inherited by the location blocks below because
    # none of them define their own add_header. HSTS is intentionally NOT set
    # here — terminate TLS at the outer reverse proxy and set HSTS there (this
    # container listens on plain HTTP behind that proxy).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP tuned for a Vite/Vue SPA: external hashed JS/CSS ('self'), inline
    # styles (Vue style bindings + Tailwind) need 'unsafe-inline'; previews use
    # blob:/data: images and render PDFs in an <iframe> from a blob: URL, so
    # frame-src/worker-src must permit blob:; API + WebSocket are same-origin
    # ('self'). script-src stays 'self' (no unsafe-inline), so a blob: iframe
    # can't execute injected inline script. Tighten/loosen if you add or remove
    # external asset sources.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # API proxy — proxies /api/ requests to the backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for real-time task updates
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}