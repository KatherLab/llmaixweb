<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Apply dark mode before first paint to avoid a light-mode flash.
      // Mirrors AppLayout.vue's logic: localStorage['darkMode'] stores '1'/'0';
      // when unset, fall back to the OS preference.
      //
      // NOTE: this inline script is allowlisted in nginx.conf's CSP by its
      // sha256 hash. If you change anything below (even whitespace), the hash
      // changes and the script will be blocked in the nginx-served build —
      // recompute it and update the script-src hash in frontend/nginx.conf.
      ;(function () {
        try {
          var saved = localStorage.getItem('darkMode')
          var dark =
            saved !== null
              ? saved === '1'
              : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {
          /* localStorage/matchMedia unavailable — default to light */
        }
      })()
    </script>
    <title>LLMAIx</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
