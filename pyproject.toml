[project]
name = "llmaixweb"
version = "0.2.3"
description = "LLM Information Extraction Web Application"
requires-python = ">=3.13,<3.14"
dependencies = [
    "fastapi[standard]==0.136.1",
    "uvicorn==0.47.0",
    "pyjwt==2.12.1",
    "sqlalchemy==2.0.49",
    "psycopg[binary,pool]==3.3.4",
    "pydantic_settings==2.14.1",
    "openai==2.37.0",
    "bcrypt==5.0.0",
    "boto3==1.43.12",
    "boto3-stubs==1.43.12",
    "mistralai==2.4.5",
    "docling==2.95.0",
    "pypdf==6.12.0",
    "redis==7.4.0",
    "celery==5.6.3",
    "jsonschema==4.26.0",
    "thefuzz==0.22.1",
    "pandas==3.0.3",
    "pandas-stubs==3.0.0.260204",
    "xlsxwriter==3.2.9",
    "celery-types==0.26.0",
    "alembic==1.18.4",
    "ty==0.0.38",
    "ruff==0.15.14",
    "ocrmypdf==17.4.2",
    "slowapi==0.1.9",
    "cryptography==48.0.0",
]

[dependency-groups]
dev = [
    "ruff==0.15.14",
    "ty==0.0.38",
    "pytest==9.0.3",
    "pytest-cov==7.1.0",
    "isort==8.0.1",
]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]  # Line length - too strict for strings/comments

[tool.ruff.lint.per-file-ignores]
"alembic/env.py" = ["F405"]  # Alembic context is injected at runtime
"backend/src/core/config.py" = ["N802"]  # Pydantic property naming
"backend/src/schemas/**/*.py" = ["N805"]  # Pydantic validators use cls
"backend/src/routers/v1/endpoints/documents.py" = ["N806"]  # Type aliases (D, F)
"backend/src/routers/v1/endpoints/files.py" = ["N806"]  # Type aliases (CLIP)
"backend/src/routers/v1/endpoints/projects.py" = ["N806"]  # Type aliases (D, F, T, TR, CLIP)
"backend/src/routers/v1/endpoints/trials.py" = ["N806"]  # Type aliases (T, TR)
